<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Profumi</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/script.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-info" href="visualizza.html">Gestione Profumi</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="visualizza.html"> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="aggiungi.html"> Aggiungi</a>
                    </li>
                </ul>
                <a class="btn btn-outline-info btn-sm" href="../index.html">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5 w-50" id="add-container">
        <h1>Aggiungi Profumo</h1>
        <form action="visualizza.html">
            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" name="nome" required>
            </div>
            <div class="mb-3">
                <label for="brand" class="form-label">Brand</label>
                <input type="text" class="form-control" id="brand" name="brand" required>
            </div>
            <div class="mb-3">
                <label for="price" class="form-label">Prezzo</label>
                <input type="number" class="form-control" id="price" name="price" required>
            </div>
            <div class="mb-3">
                <label for="size" class="form-label">Size</label>
                <select class="form-select" id="size" name="size" required>
                    <option value="">Seleziona una dimensione</option>
                    <option value="50ml">50ml</option>
                    <option value="100ml">100ml</option>
                </select>
            </div>   
            <button type="submit" class="btn btn-primary w-100" onclick="addParfume()" >Aggiungi Profumo</button>
        </form>
        
    </div>
</body>
</html>
