<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Profumi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/script.js"></script>
    
</head>
<body class="bg-light">
     <nav class="navbar navbar-dark bg-dark fixed-top shadow-sm">
        <div class="container justify-content-center">
            <span class="navbar-brand fw-bold text-info">Gestione Profumi</span>
        </div>
    </nav>

    <div class="container w-100" id="login-container">
        <div class="card shadow-lg border-0 rounded-4 p-5 mt-3 w-50 mx-auto">

            <div class="text-center mb-4">
                <h1 class="fw-bold text-info">Login</h1>
                <p class="text-muted mb-0">Accedi al tuo account</p>
            </div>
            
        <form onsubmit="return false">
            <div class=" mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control  " id="username" name="username" required>
            </div>
            <div class="mb-3 ">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control " id="password" name="password" required>
            </div>
            <button type="button" class="btn btn-primary w-100" onclick="check()" >Login</button>
            <button type="button" class="btn btn-primary w-100 mt-3" onclick="add()" >Register</button>
        </form>
        </div>
    </div>
</body>
</html>
